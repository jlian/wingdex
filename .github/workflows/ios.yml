name: iOS Build & Test

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'ios/**'
      - 'openapi.yaml'

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-26
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate GitInfo.swift
        run: scripts/gen-git-info.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve SPM dependencies
        run: xcodebuild -resolvePackageDependencies -project WingDex.xcodeproj -scheme WingDex

      - name: Build for Simulator
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project WingDex.xcodeproj \
            -scheme WingDex \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project WingDex.xcodeproj \
            -scheme WingDex \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -skip-testing:WingDexTests/AuthIntegrationTests \
            -only-testing:WingDexTests \
            CODE_SIGNING_ALLOWED=NO

  validate-openapi:
    name: Validate OpenAPI spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Lint OpenAPI spec
        run: npx --yes @redocly/cli lint openapi.yaml --skip-rule no-server-trailing-slash
