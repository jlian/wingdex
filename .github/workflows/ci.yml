name: CI & Preview

on:
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Verify & Deploy Preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --workspaces=false

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium > /dev/null

      - name: Install Playwright deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium > /dev/null

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Migrate local D1
        run: printf 'y\n' | npx wrangler d1 migrations apply wingdex-db --local
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: E2E tests
        run: npx playwright test
        env:
          RUN_LIVE_E2E: '0'
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 migrations to preview DB
        if: github.head_ref != 'dev' && github.head_ref != 'main'
        run: printf 'y\n' | npx wrangler d1 migrations apply wingdex-db-dev --remote --env preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Skip deploy when the release workflow already handles this branch
      - name: Deploy preview to Cloudflare Pages
        if: github.head_ref != 'dev' && github.head_ref != 'main'
        id: deploy_preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=wingdex --branch=${{ github.head_ref }}

      - name: Branch preview deployment
        if: github.head_ref != 'dev' && github.head_ref != 'main'
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_URL: ${{ steps.deploy_preview.outputs['pages-deployment-alias-url'] || steps.deploy_preview.outputs['deployment-url'] }}
        with:
          script: |
            const { data: deployment } = await github.rest.repos.createDeployment({
              ...context.repo,
              ref: '${{ github.event.pull_request.head.sha }}',
              environment: 'preview (${{ github.head_ref }})',
              auto_merge: false,
              required_contexts: [],
              production_environment: false,
            });
            await github.rest.repos.createDeploymentStatus({
              ...context.repo,
              deployment_id: deployment.id,
              state: 'success',
              environment_url: process.env.DEPLOYMENT_URL,
            });
