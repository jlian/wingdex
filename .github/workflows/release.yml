name: Release

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  deployments: write

jobs:
  release:
    name: Release & Deploy
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || github.ref_name }}
      url: ${{ github.ref == 'refs/heads/main' && 'https://wingdex.app' || format('https://{0}.wingdex.pages.dev', github.ref_name) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pre-release typecheck
        if: github.ref == 'refs/heads/main'
        run: npm run typecheck

      - name: Run semantic-release
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Build deploy artifact
        run: npm run build

      - name: Ensure BETTER_AUTH_SECRET in Pages
        run: |
          if [ -z "${BETTER_AUTH_SECRET:-}" ]; then
            echo "Missing BETTER_AUTH_SECRET GitHub secret"
            exit 1
          fi
          printf '%s' "$BETTER_AUTH_SECRET" | npx wrangler pages secret put BETTER_AUTH_SECRET --project-name=wingdex
        env:
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 migrations
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            npx wrangler d1 migrations apply wingdex-db --remote
          else
            npx wrangler d1 migrations apply wingdex-db-dev --remote --env preview
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=wingdex ${{ github.ref != 'refs/heads/main' && format('--branch={0}', github.ref_name) || '' }}

      - name: Purge production edge cache
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -z "${CLOUDFLARE_ZONE_ID:-}" ]; then
            echo "Missing CLOUDFLARE_ZONE_ID GitHub secret"
            exit 1
          fi

          curl --fail --silent --show-error \
            -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}

      - name: Verify deployed version
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")

          if [ "${{ github.ref_name }}" = "main" ]; then
            DOMAINS="wingdex.app wingdex.pages.dev"
          else
            DOMAINS="${{ github.ref_name }}.wingdex.pages.dev"
          fi

          MAX_ATTEMPTS=5
          for DOMAIN in $DOMAINS; do
            echo "Checking ${DOMAIN} for version ${VERSION}"
            VERIFIED=false
            for ATTEMPT in $(seq 1 "$MAX_ATTEMPTS"); do
              if ! HTML=$(curl --fail --silent --show-error "https://${DOMAIN}/" 2>&1); then
                echo "  Attempt ${ATTEMPT}/${MAX_ATTEMPTS}: fetch failed, retrying in 10s..."
                sleep 10
                continue
              fi

              ASSET=$(printf '%s' "$HTML" | grep -oE 'assets/index-[^"]+\.js' | head -n1)
              if [ -z "$ASSET" ]; then
                echo "  Attempt ${ATTEMPT}/${MAX_ATTEMPTS}: no index asset found, retrying in 10s..."
                sleep 10
                continue
              fi

              JS=$(curl --fail --silent --show-error "https://${DOMAIN}/${ASSET}")
              if printf '%s' "$JS" | grep -F "$VERSION" >/dev/null; then
                echo "  Verified ${DOMAIN} serves version ${VERSION}"
                VERIFIED=true
                break
              fi

              echo "  Attempt ${ATTEMPT}/${MAX_ATTEMPTS}: version mismatch, retrying in 10s..."
              sleep 10
            done

            if [ "$VERIFIED" != "true" ]; then
              echo "Failed to verify ${DOMAIN} after ${MAX_ATTEMPTS} attempts"
              exit 1
            fi
          done
