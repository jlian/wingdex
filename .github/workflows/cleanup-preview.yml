name: Cleanup Preview

on:
  pull_request:
    types: [closed]

permissions:
  deployments: write

jobs:
  cleanup:
    name: Deactivate preview deployments
    runs-on: ubuntu-latest
    steps:
      - name: Deactivate preview deployments
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const envName = `preview (${branch})`;
            const deployments = await github.rest.repos.listDeployments({
              ...context.repo,
              environment: envName,
              per_page: 100,
            });
            for (const d of deployments.data) {
              await github.rest.repos.createDeploymentStatus({
                ...context.repo,
                deployment_id: d.id,
                state: 'inactive',
              });
            }
            core.info(`Deactivated ${deployments.data.length} deployment(s) for ${envName}`);
