name: Rehydrate Wiki Taxonomy

on:
  workflow_dispatch:
    inputs:
      images_only:
        description: 'Skip title resolution, re-fetch all thumbnail URLs only'
        type: boolean
        default: false
  schedule:
    - cron: '0 8 1 * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  rehydrate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rehydrate wiki metadata
        run: npm run taxonomy -- hydrate ${{ inputs.images_only == true && '--images-only' || '' }}

      - name: Validate wiki metadata
        run: npm run taxonomy -- validate

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/rehydrate-wiki-taxonomy
          title: 'chore: rehydrate wiki taxonomy metadata'
          commit-message: 'chore: rehydrate wiki taxonomy metadata'
          body: |
            Automated monthly wiki taxonomy refresh.
            - Re-resolves Wikipedia titles via Wikidata SPARQL (bulk)
            - Refreshes precomputed thumbnail URLs via MediaWiki pageimages API (batched, 50/request)
          labels: automation
