name: WingDex
options:
  bundleIdPrefix: app.wingdex
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.3"
  createIntermediateGroups: true
  postGenCommand: scripts/fix-icon-ref.sh && scripts/gen-git-info.sh

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    SWIFT_EMIT_LOC_STRINGS: "YES"
    DEVELOPMENT_TEAM: Z8LQS5S492
    STRING_CATALOG_GENERATE_SYMBOLS: "YES"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "YES"

targets:
  WingDex:
    type: application
    platform: iOS
    sources:
      - path: WingDex
        excludes:
          - "Preview Content"
          - "Resources/AppIcon.icon"
      - path: WingDex/Preview Content
        compilerFlags: ""
    resources:
      - path: WingDex/Resources
        excludes:
          - "AppIcon.icon"
      - path: WingDex/Assets.xcassets
      - path: WingDex/Preview Content/Preview Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.wingdex
        MARKETING_VERSION: "0.5.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: WingDex/WingDex.entitlements
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: "YES"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.lifestyle"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: WingDex/Info.plist
      properties:
        CFBundleDisplayName: WingDex
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        NSCameraUsageDescription: "WingDex uses the camera so you can take bird photos for identification."
        NSPhotoLibraryUsageDescription: "WingDex uses your photo library so you can choose bird photos to identify."
        NSPhotoLibraryAddUsageDescription: "WingDex may save captured bird photos to your library when you choose to keep them."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - wingdex
    dependencies:
      - package: swift-openapi-runtime
        product: OpenAPIRuntime
      - package: swift-openapi-urlsession
        product: OpenAPIURLSession
      - package: KeychainAccess

  WingDexTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WingDexTests
    dependencies:
      - target: WingDex
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.wingdex.tests
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  Localhost:
    build:
      targets:
        WingDex: all
    run:
      config: Debug
      environmentVariables:
        - variable: API_BASE_URL
          value: https://localhost.wingdex.app
          isEnabled: true
    test:
      config: Debug
      targets:
        - WingDexTests
    profile:
      config: Release
    analyze:
      config: Debug

  Dev:
    build:
      targets:
        WingDex: all
    run:
      config: Debug
      environmentVariables:
        - variable: API_BASE_URL
          value: https://dev.wingdex.app
          isEnabled: true
    test:
      config: Debug
      targets:
        - WingDexTests
    profile:
      config: Release
    analyze:
      config: Debug

  Production:
    build:
      targets:
        WingDex: all
    run:
      config: Release
    profile:
      config: Release
    analyze:
      config: Release

packages:
  swift-openapi-generator:
    url: https://github.com/apple/swift-openapi-generator
    from: "1.6.0"
  swift-openapi-runtime:
    url: https://github.com/apple/swift-openapi-runtime
    from: "1.7.0"
  swift-openapi-urlsession:
    url: https://github.com/apple/swift-openapi-urlsession
    from: "1.0.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.2"
