name: WingDex
options:
  bundleIdPrefix: app.wingdex
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    SWIFT_EMIT_LOC_STRINGS: "YES"

targets:
  WingDex:
    type: application
    platform: iOS
    sources:
      - path: WingDex
        excludes:
          - "Preview Content"
    resources:
      - path: WingDex/Resources
      - path: WingDex/Assets.xcassets
      - path: WingDex/Preview Content
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.wingdex
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_TEAM: Z8LQS5S492
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: WingDex/WingDex.entitlements
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: WingDex/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - wingdex
    dependencies:
      - package: swift-openapi-runtime
        product: OpenAPIRuntime
      - package: swift-openapi-urlsession
        product: OpenAPIURLSession
      - package: KeychainAccess

  WingDexTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WingDexTests
    dependencies:
      - target: WingDex
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.wingdex.tests
        DEVELOPMENT_TEAM: Z8LQS5S492
        CODE_SIGN_STYLE: Automatic

packages:
  swift-openapi-generator:
    url: https://github.com/apple/swift-openapi-generator
    from: "1.6.0"
  swift-openapi-runtime:
    url: https://github.com/apple/swift-openapi-runtime
    from: "1.7.0"
  swift-openapi-urlsession:
    url: https://github.com/apple/swift-openapi-urlsession
    from: "1.0.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.2"
